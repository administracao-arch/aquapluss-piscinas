<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AquaPluss - App Piscineiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        
        :root{
            --primary:#0891b2;
            --primary-dark:#0e7490;
            --success:#059669;
            --danger:#dc2626;
            --warning:#d97706;
            --bg:#f0f4f8;
            --card:#ffffff;
            --text:#1a1d23;
            --text2:#5a5f6b;
            --border:#e2e5ea;
            --shadow:0 2px 8px rgba(0,0,0,0.08);
            --radius:12px;
        }
        
        body{
            font-family:'Inter',-apple-system,sans-serif;
            background:var(--bg);
            min-height:100vh;
            -webkit-tap-highlight-color:transparent;
            display:flex;
        }
        
        /* SIDEBAR */
        .sidebar{
            width:260px;
            background:linear-gradient(180deg,#0e7490,#0891b2);
            color:white;
            position:fixed;
            top:0;left:0;bottom:0;
            z-index:200;
            padding:20px 0;
            display:flex;
            flex-direction:column;
            transition:transform 0.3s;
        }
        
        .sidebar.hidden{transform:translateX(-100%);}
        
        .sidebar-logo{
            padding:0 20px 20px;
            border-bottom:1px solid rgba(255,255,255,0.2);
            text-align:center;
        }
        
        .sidebar-logo .icon{font-size:36px;}
        .sidebar-logo .title{font-size:18px;font-weight:700;margin-top:4px;}
        .sidebar-logo .sub{font-size:11px;opacity:0.8;}
        
        .sidebar-user{
            padding:12px 20px;
            border-bottom:1px solid rgba(255,255,255,0.2);
            display:flex;
            align-items:center;
            gap:10px;
        }
        
        .sidebar-user-avatar{
            width:36px;height:36px;
            border-radius:50%;
            background:rgba(255,255,255,0.2);
            display:flex;align-items:center;justify-content:center;
            font-weight:700;font-size:14px;
        }
        
        .sidebar-user-info{flex:1;}
        .sidebar-user-name{font-size:13px;font-weight:600;}
        .sidebar-user-role{font-size:11px;opacity:0.7;}
        
        .sidebar-nav{flex:1;padding:10px 0;overflow-y:auto;}
        .sidebar-nav a{
            display:flex;align-items:center;gap:10px;
            padding:12px 20px;
            color:rgba(255,255,255,0.8);
            text-decoration:none;
            font-size:14px;font-weight:500;
            transition:all 0.2s;
            cursor:pointer;
        }
        .sidebar-nav a:hover,.sidebar-nav a.active{
            background:rgba(255,255,255,0.15);
            color:white;
        }
        .sidebar-nav a .nav-icon{font-size:18px;width:24px;text-align:center;}
        
        .sidebar-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,0.2);}
        
        /* MAIN */
        .main-content{
            flex:1;
            margin-left:260px;
            min-height:100vh;
            transition:margin-left 0.3s;
        }
        
        .main-content.expanded{margin-left:0;}
        
        /* HEADER MOBILE */
        .mobile-header{
            display:none;
            background:var(--primary);
            color:white;
            padding:14px 16px;
            align-items:center;
            gap:12px;
            position:sticky;
            top:0;
            z-index:100;
        }
        
        .mobile-header .menu-btn{
            background:none;border:none;
            color:white;font-size:22px;
            cursor:pointer;padding:4px;
        }
        
        .mobile-header .title{
            font-size:16px;font-weight:600;flex:1;
        }
        
        .container{padding:16px;max-width:500px;margin:0 auto;}
        
        /* CARDS */
        .card{
            background:var(--card);
            border-radius:var(--radius);
            padding:16px;
            margin-bottom:12px;
            box-shadow:var(--shadow);
            animation:fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn{
            from{opacity:0;transform:translateY(10px);}
            to{opacity:1;transform:translateY(0);}
        }
        
        .card-title{
            font-size:14px;font-weight:600;
            color:var(--text);
            margin-bottom:12px;
            display:flex;align-items:center;gap:8px;
        }
        
        .card-title .icon{font-size:18px;}
        
        /* BOTÕES */
        .btn{
            display:inline-flex;align-items:center;justify-content:center;gap:6px;
            padding:12px 20px;
            border:none;border-radius:10px;
            font-size:14px;font-weight:600;
            cursor:pointer;
            font-family:inherit;
            transition:all 0.2s;
            text-align:center;
            width:100%;
            position:relative;
            overflow:hidden;
        }
        
        .btn:active{transform:scale(0.96);}
        .btn::after{
            content:'';
            position:absolute;
            top:50%;left:50%;
            width:0;height:0;
            border-radius:50%;
            background:rgba(255,255,255,0.3);
            transform:translate(-50%,-50%);
            transition:width 0.6s,height 0.6s;
        }
        .btn:active::after{width:300px;height:300px;}
        
        .btn-primary{background:var(--primary);color:white;}
        .btn-success{background:var(--success);color:white;}
        .btn-danger{background:var(--danger);color:white;}
        .btn-warning{background:var(--warning);color:white;}
        .btn-outline{background:white;border:2px solid var(--primary);color:var(--primary);}
        .btn-sm{padding:8px 14px;font-size:12px;width:auto;}
        .btn-xs{padding:6px 10px;font-size:11px;width:auto;border-radius:8px;}
        .btn-icon{width:40px;height:40px;padding:0;border-radius:50%;}
        .btn:disabled{opacity:0.5;cursor:not-allowed;}
        
        /* TIMER */
        .timer-display{
            text-align:center;
            padding:20px;
            background:linear-gradient(135deg,#ecfeff,#e0f2fe);
            border-radius:var(--radius);
            margin-bottom:12px;
        }
        
        .timer-number{
            font-size:64px;
            font-weight:700;
            color:var(--primary);
            letter-spacing:-2px;
            transition:color 0.3s;
        }
        
        .timer-number.alerta{
            color:var(--danger);
            animation:pulse 0.8s infinite;
        }
        
        @keyframes pulse{
            0%,100%{opacity:1;transform:scale(1);}
            50%{opacity:0.5;transform:scale(1.05);}
        }
        
        .timer-label{
            font-size:12px;
            color:var(--text2);
            margin-top:4px;
        }
        
        /* TAGS */
        .tag-group{display:flex;flex-wrap:wrap;gap:6px;}
        .tag{
            padding:8px 14px;
            border-radius:20px;
            cursor:pointer;
            font-size:12px;font-weight:500;
            border:1px solid var(--border);
            background:#f8fafc;
            transition:all 0.2s;
            user-select:none;
        }
        .tag:active{transform:scale(0.95);}
        .tag.active{
            background:var(--primary);
            color:white;
            border-color:var(--primary);
            box-shadow:0 2px 8px rgba(8,145,178,0.3);
        }
        
        /* PRODUTOS RÁPIDOS */
        .quick-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
        .quick-btn{
            padding:6px 12px;
            border-radius:16px;
            border:1px solid var(--border);
            background:white;
            font-size:11px;font-weight:500;
            cursor:pointer;
            transition:all 0.2s;
            font-family:inherit;
        }
        .quick-btn:hover{
            background:var(--primary);
            color:white;
            border-color:var(--primary);
        }
        .quick-btn.used{
            background:#fef3c7;
            border-color:#d97706;
            color:#92400e;
        }
        
        /* ESTOQUE DO CLIENTE */
        .estoque-item{
            display:flex;align-items:center;justify-content:space-between;
            padding:8px 0;
            border-bottom:1px solid #f1f5f9;
            font-size:13px;
            gap:8px;
        }
        .estoque-item:last-child{border-bottom:none;}
        .estoque-qtd{
            font-weight:600;
            color:var(--primary);
            white-space:nowrap;
        }
        .estoque-qtd.baixo{color:var(--warning);}
        .estoque-qtd.esgotado{color:var(--danger);}
        
        /* INPUT */
        input,select,textarea{
            width:100%;
            padding:12px;
            border:1px solid var(--border);
            border-radius:8px;
            font-size:14px;
            font-family:inherit;
            margin-bottom:8px;
            background:#f8fafc;
            transition:border 0.2s;
        }
        input:focus,select:focus,textarea:focus{
            outline:none;
            border-color:var(--primary);
            box-shadow:0 0 0 3px rgba(8,145,178,0.1);
            background:white;
        }
        
        label{
            font-size:11px;font-weight:600;
            color:var(--text2);
            display:block;
            margin-bottom:4px;
            text-transform:uppercase;
            letter-spacing:0.05em;
        }
        
        /* BADGES */
        .badge{
            display:inline-block;
            padding:4px 10px;
            border-radius:12px;
            font-size:11px;font-weight:600;
        }
        .badge-success{background:#ecfdf5;color:#065f46;}
        .badge-warning{background:#fef3c7;color:#92400e;}
        .badge-danger{background:#fef2f2;color:#991b1b;}
        
        /* ALERTA */
        .alert-toast{
            position:fixed;
            top:20px;left:50%;transform:translateX(-50%);
            background:var(--danger);
            color:white;
            padding:16px 24px;
            border-radius:var(--radius);
            font-weight:600;
            z-index:1000;
            display:none;
            box-shadow:0 4px 20px rgba(0,0,0,0.3);
            text-align:center;
            max-width:90%;
        }
        .alert-toast.show{display:block;animation:slideDown 0.3s ease;}
        
        @keyframes slideDown{
            from{opacity:0;transform:translateX(-50%) translateY(-20px);}
            to{opacity:1;transform:translateX(-50%) translateY(0);}
        }
        
        /* OVERLAY MOBILE */
        .sidebar-overlay{
            display:none;
            position:fixed;
            top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.5);
            z-index:199;
        }
        .sidebar-overlay.show{display:block;}
        
        /* LOGIN */
        .login-box{max-width:400px;margin:60px auto;padding:20px;}
        .login-logo{text-align:center;font-size:48px;margin-bottom:16px;}
        .login-title{text-align:center;font-size:20px;font-weight:600;color:var(--text);}
        .login-subtitle{text-align:center;font-size:13px;color:var(--text2);margin-bottom:24px;}
        
        .loading{text-align:center;padding:40px;color:var(--text2);}
        .spinner{
            display:inline-block;
            width:30px;height:30px;
            border:3px solid var(--border);
            border-top-color:var(--primary);
            border-radius:50%;
            animation:spin 0.8s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg);}}
        
        .empty-state{text-align:center;padding:40px;color:var(--text2);}
        .empty-state .icon{font-size:48px;margin-bottom:12px;}
        
        .cliente-info-card{
            background:#f0fdf4;
            border:1px solid #bbf7d0;
            border-radius:10px;
            padding:12px;
            margin-bottom:12px;
        }
        .cliente-info-card p{font-size:13px;margin-bottom:4px;}
        .cliente-info-card p:last-child{margin-bottom:0;}
        
        @media (max-width:768px){
            .sidebar{transform:translateX(-100%);}
            .sidebar.show{transform:translateX(0);}
            .main-content{margin-left:0;}
            .mobile-header{display:flex;}
            .sidebar-overlay.show{display:block;}
            .timer-number{font-size:48px;}
        }
    </style>
</head>
<body>

    <!-- SIDEBAR OVERLAY -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="icon">🔧</div>
            <div class="title">AquaPluss</div>
            <div class="sub">App Piscineiro</div>
        </div>
        
        <div class="sidebar-user">
            <div class="sidebar-user-avatar" id="sidebarAvatar">P</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebarNome">Piscineiro</div>
                <div class="sidebar-user-role" id="sidebarEmail">carregando...</div>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a onclick="navegar('clientes')" id="navClientes" class="active">
                <span class="nav-icon">📋</span> Clientes
            </a>
            <a onclick="navegar('estoque')" id="navEstoque">
                <span class="nav-icon">📦</span> Estoque
            </a>
            <a onclick="navegar('historico')" id="navHistorico">
                <span class="nav-icon">📊</span> Meus Atendimentos
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <button class="btn btn-outline btn-sm" onclick="sairApp()" style="color:white;border-color:rgba(255,255,255,0.5);background:transparent;width:100%;">
                🚪 Sair
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">
        <!-- Mobile Header -->
        <div class="mobile-header">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <span class="title">AquaPluss Piscineiro</span>
        </div>
        
        <div class="alert-toast" id="alertaTimer">
            ⏰ Atendimento passou de 20 min!
            <br><button class="btn btn-warning btn-sm" onclick="prorrogarTempo()" style="margin-top:8px;width:auto;">Prorrogar +10 min</button>
        </div>
        
        <div class="container" id="appContent"></div>
    </main>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyByxj9418BYG26MpB1h9GZAFUmRiu_3HZc",
            authDomain: "aquaplusspiscinas.firebaseapp.com",
            projectId: "aquaplusspiscinas",
            storageBucket: "aquaplusspiscinas.firebasestorage.app",
            messagingSenderId: "844112800471",
            appId: "1:844112800471:web:468c21d1eafdd9a4071e92"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== ESTADO ====================
        var atendimentoAtivo = null;
        var timerInterval = null;
        var segundos = 0;
        var tempoLimite = 1200;
        var prorrogado = false;
        var alertaMostrado = false;
        var procedimentosPadrao = ["Drenagem","Escovação","Limpeza pré-filtro","Aspiração","Teste pH","Aplicação cloro","Clarificação","Limpeza bordas","Retrolavagem"];
        var produtosUsados = [];
        var procedimentosFeitos = [];
        var audioContext = null;
        var paginaAtual = 'clientes';
        var userLogado = null;
        var piscinasCliente = [];

        // ==================== UI ====================
        function render(html){document.getElementById('appContent').innerHTML = html;}
        function showLoading(msg){render('<div class="loading"><div class="spinner"></div><p style="margin-top:12px;">'+(msg||'Carregando...')+'</p></div>');}
        
        function toggleSidebar(){
            document.getElementById('sidebar').classList.toggle('show');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        function navegar(pagina){
            paginaAtual = pagina;
            document.querySelectorAll('.sidebar-nav a').forEach(function(a){a.classList.remove('active');});
            document.getElementById('nav'+pagina.charAt(0).toUpperCase()+pagina.slice(1)).classList.add('active');
            if(window.innerWidth <= 768) toggleSidebar();
            
            if(atendimentoAtivo){
                mostrarAtendimentoAtivo();
                return;
            }
            
            if(pagina === 'clientes') mostrarSelecaoCliente();
            else if(pagina === 'estoque') mostrarEstoqueGeral();
            else if(pagina === 'historico') mostrarHistorico();
        }

        // ==================== ÁUDIO ====================
        function beep(){
            try{
                if(!audioContext) audioContext = new(window.AudioContext||window.webkitAudioContext)();
                var o=audioContext.createOscillator(),g=audioContext.createGain();
                o.connect(g);g.connect(audioContext.destination);
                o.frequency.value=800;o.type="square";g.gain.value=0.3;
                o.start();setTimeout(function(){o.stop();},200);
            }catch(e){}
        }
        function beepTriplo(){beep();setTimeout(beep,400);setTimeout(beep,800);}

        // ==================== LOGIN ====================
        function showLogin(){
            render('<div class="login-box"><div class="login-logo">🔧</div><div class="login-title">AquaPluss Piscineiro</div><div class="login-subtitle">Faça login para começar</div><div class="card"><form id="loginForm"><div style="margin-bottom:12px;"><label>E-mail</label><input type="email" id="emailInput" placeholder="seu@email.com" required></div><div style="margin-bottom:12px;"><label>Senha</label><input type="password" id="passwordInput" placeholder="••••••••" required></div><button type="submit" class="btn btn-primary" id="loginBtn">Entrar</button></form><p id="loginError" style="color:#dc2626;font-size:12px;margin-top:8px;display:none;"></p></div></div>');
            
            document.getElementById('loginForm').addEventListener('submit',function(e){
                e.preventDefault();
                var email=document.getElementById('emailInput').value.trim();
                var pw=document.getElementById('passwordInput').value;
                var btn=document.getElementById('loginBtn');
                var errEl=document.getElementById('loginError');
                if(!email||!pw){errEl.textContent='Preencha todos os campos.';errEl.style.display='block';return;}
                btn.disabled=true;btn.textContent='Entrando...';errEl.style.display='none';
                
                auth.signInWithEmailAndPassword(email,pw)
                    .then(function(uc){
                        sessionStorage.setItem('aquapluss-piscineiro-user',JSON.stringify({uid:uc.user.uid,email:uc.user.email}));
                        carregarApp();
                    })
                    .catch(function(err){
                        var msg='Erro ao fazer login.';
                        if(err.code==='auth/user-not-found')msg='Usuário não encontrado.';
                        else if(err.code==='auth/wrong-password')msg='Senha incorreta.';
                        errEl.textContent=msg;errEl.style.display='block';
                        btn.disabled=false;btn.textContent='Entrar';
                    });
            });
        }

        function sairApp(){
            if(confirm('Deseja sair do aplicativo?')){
                sessionStorage.removeItem('aquapluss-piscineiro-user');
                localStorage.removeItem('aquapluss-atendimento');
                auth.signOut().then(showLogin).catch(function(){showLogin();});
            }
        }

        // ==================== APP ====================
        async function carregarApp(){
            var saved=localStorage.getItem('aquapluss-atendimento');
            if(saved){
                try{
                    atendimentoAtivo=JSON.parse(saved);
                    segundos=Math.floor((new Date()-new Date(atendimentoAtivo.timestamp||new Date()))/1000);
                    if(segundos<0)segundos=0;
                    if(segundos>=tempoLimite&&!atendimentoAtivo.prorrogado)alertaMostrado=true;
                    timerInterval=setInterval(atualizarTimer,1000);
                    mostrarAtendimentoAtivo();
                    return;
                }catch(e){localStorage.removeItem('aquapluss-atendimento');}
            }
            
            // Buscar dados do usuário
            try{
                var sessionUser=JSON.parse(sessionStorage.getItem('aquapluss-piscineiro-user'));
                if(sessionUser){
                    var userDoc=await db.collection('usuarios').doc(sessionUser.uid).get();
                    if(userDoc.exists){
                        userLogado=userDoc.data();
                        userLogado.uid=sessionUser.uid;
                    }
                    document.getElementById('sidebarNome').textContent=userLogado?userLogado.nome:'Piscineiro';
                    document.getElementById('sidebarEmail').textContent=sessionUser.email;
                    document.getElementById('sidebarAvatar').textContent=(userLogado?userLogado.nome:'P').substring(0,2).toUpperCase();
                }
            }catch(e){}
            
            mostrarSelecaoCliente();
        }

        // ==================== SELEÇÃO DE CLIENTES ====================
        async function mostrarSelecaoCliente(){
            showLoading('Carregando clientes...');
            try{
                var clientesSnap=await db.collection('clientes').where('status','==','ativo').orderBy('nome').get();
                if(clientesSnap.empty){
                    render('<div class="empty-state"><div class="icon">📋</div><p>Nenhum cliente ativo.</p></div>');
                    return;
                }
                var html='<div class="card"><div class="card-title"><span class="icon">📋</span>Selecione o Cliente</div>';
                html+='<select id="clienteSelect" onchange="selecionarCliente()" style="font-size:16px;">';
                html+='<option value="">Selecione um cliente...</option>';
                clientesSnap.docs.forEach(function(d){
                    var c=d.data();
                    html+='<option value="'+d.id+'">'+c.nome+' - '+(c.logradouro||'Sem endereço')+'</option>';
                });
                html+='</select></div><div id="clienteInfo"></div>';
                render(html);
            }catch(e){
                render('<div class="card"><p style="color:#dc2626;">Erro: '+e.message+'</p><button class="btn btn-primary btn-sm" onclick="carregarApp()">Tentar novamente</button></div>');
            }
        }

        async function selecionarCliente(){
            var id=document.getElementById('clienteSelect').value;
            if(!id){document.getElementById('clienteInfo').innerHTML='';return;}
            document.getElementById('clienteInfo').innerHTML='<div class="loading"><div class="spinner"></div></div>';
            
            try{
                var d=await db.collection('clientes').doc(id).get();
                if(!d.exists){document.getElementById('clienteInfo').innerHTML='<p>Cliente não encontrado.</p>';return;}
                var c=d.data();
                
                // Buscar piscinas do cliente
                piscinasCliente=[];
                var pSnap=await db.collection('piscinas').where('clienteId','==',id).get();
                pSnap.docs.forEach(function(pd){piscinasCliente.push({id:pd.id,data:pd.data()});});
                
                var html='<div class="cliente-info-card">';
                html+='<p>🏠 <strong>'+c.nome+'</strong></p>';
                html+='<p>📍 '+(c.logradouro||'')+', '+(c.numero||'')+' - '+(c.bairro||'')+'</p>';
                html+='<p>📱 '+(c.telefone||'Não informado')+'</p>';
                if(c.tamanhoPiscina||c.volumeLitros)html+='<p>🏊 Piscina: '+(c.tamanhoPiscina||'N/D')+'m² - '+(c.volumeLitros||'N/D')+'L</p>';
                if(c.observacoes)html+='<p style="color:#d97706;">⚠️ '+c.observacoes+'</p>';
                html+='</div>';
                
                // Botão iniciar
                html+='<button class="btn btn-primary" onclick="iniciarAtendimento(\''+id+'\',\''+c.nome.replace(/'/g,"\\'")+'\')">▶️ Iniciar Atendimento</button>';
                
                // Estoque rápido do cliente
                if(piscinasCliente.length>0){
                    html+='<div class="card" style="margin-top:12px;"><div class="card-title"><span class="icon">📦</span>Estoque do Cliente</div>';
                    for(var pi=0;pi<piscinasCliente.length;pi++){
                        var pisc=piscinasCliente[pi];
                        html+='<p style="font-size:12px;font-weight:600;margin-bottom:4px;">🏊 '+pisc.data.codigo+'</p>';
                        var estSnap=await db.collection('piscinas').doc(pisc.id).collection('estoque').get();
                        if(estSnap.empty){
                            html+='<p style="font-size:12px;color:var(--text2);">Nenhum produto</p>';
                        }else{
                            estSnap.docs.forEach(function(ed){
                                var e=ed.data();
                                var q=e.quantidade||0;
                                var statusClass=q<=0?'esgotado':(q<=(e.quantidadeMinima||3)?'baixo':'');
                                html+='<div class="estoque-item"><span>🧴 '+e.nome+'</span><span class="estoque-qtd '+statusClass+'">'+q+' '+(e.unidade||'un')+'</span></div>';
                            });
                        }
                    }
                    html+='</div>';
                }
                
                document.getElementById('clienteInfo').innerHTML=html;
            }catch(e){
                document.getElementById('clienteInfo').innerHTML='<div class="card"><p style="color:#dc2626;">Erro: '+e.message+'</p></div>';
            }
        }

        // ==================== ATENDIMENTO ====================
        function iniciarAtendimento(clienteId,clienteNome){
            segundos=0;prorrogado=false;alertaMostrado=false;
            produtosUsados=[];procedimentosFeitos=[];tempoLimite=1200;
            var horaInicio=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
            var hojeStr=new Date().toISOString().split('T')[0];
            
            atendimentoAtivo={
                clienteId:clienteId,clienteNome:clienteNome,
                horaInicio:horaInicio,data:hojeStr,
                status:'em_andamento',timestamp:new Date().toISOString()
            };
            localStorage.setItem('aquapluss-atendimento',JSON.stringify(atendimentoAtivo));
            if(timerInterval)clearInterval(timerInterval);
            timerInterval=setInterval(atualizarTimer,1000);
            mostrarAtendimentoAtivo();
        }

        function atualizarTimer(){
            segundos++;
            var min=Math.floor(segundos/60),seg=segundos%60;
            var display=String(min).padStart(2,'0')+':'+String(seg).padStart(2,'0');
            var el=document.getElementById('timerDisplay');
            if(el)el.textContent=display;
            if(!prorrogado&&segundos>=tempoLimite&&!alertaMostrado){
                alertaMostrado=true;
                document.getElementById('alertaTimer').classList.add('show');
                var tel=document.getElementById('timerDisplay');
                if(tel)tel.classList.add('alerta');
                beepTriplo();
                if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);
            }
        }

        function prorrogarTempo(){
            prorrogado=true;alertaMostrado=false;tempoLimite+=600;
            document.getElementById('alertaTimer').classList.remove('show');
            var tel=document.getElementById('timerDisplay');
            if(tel)tel.classList.remove('alerta');
            if(atendimentoAtivo){atendimentoAtivo.prorrogado=true;localStorage.setItem('aquapluss-atendimento',JSON.stringify(atendimentoAtivo));}
        }

        function mostrarAtendimentoAtivo(){
            var a=atendimentoAtivo;
            if(!a){carregarApp();return;}
            var min=Math.floor(segundos/60),seg=segundos%60;
            var display=String(min).padStart(2,'0')+':'+String(seg).padStart(2,'0');
            
            // Tags procedimentos
            var procTags='';
            procedimentosPadrao.forEach(function(p){
                var ativo=procedimentosFeitos.includes(p)?' active':'';
                procTags+='<span class="tag'+ativo+'" onclick="toggleProcedimento(\''+p.replace(/'/g,"\\'")+'\')">'+p+'</span>';
            });
            
            // Produtos usados
            var prodList='';
            if(produtosUsados.length===0){
                prodList='<p style="color:var(--text2);font-size:12px;text-align:center;">Nenhum produto</p>';
            }else{
                produtosUsados.forEach(function(p,idx){
                    prodList+='<div class="estoque-item"><span>🧴 '+p.nome+' - '+p.qtd+'</span><span style="color:var(--danger);cursor:pointer;font-size:18px;" onclick="removerProduto('+idx+')">✕</span></div>';
                });
            }
            
            var html='';
            
            // Timer
            html+='<div class="timer-display">';
            html+='<div class="timer-number'+(alertaMostrado?' alerta':'')+'" id="timerDisplay">'+display+'</div>';
            html+='<div class="timer-label">minutos:segundos</div>';
            html+='<p style="font-size:14px;margin-top:4px;">🏠 <strong>'+a.clienteNome+'</strong></p>';
            html+='<p style="font-size:12px;color:var(--text2);">Início: '+a.horaInicio+'</p>';
            html+='</div>';
            
            // Procedimentos
            html+='<div class="card"><div class="card-title"><span class="icon">🔧</span>Procedimentos</div>';
            html+='<div class="tag-group">'+procTags+'</div></div>';
            
            // Produtos - Botões rápidos de medida
            html+='<div class="card"><div class="card-title"><span class="icon">🧪</span>Produtos Utilizados</div>';
            html+='<input type="text" id="produtoNome" placeholder="Nome do produto..." style="margin-bottom:4px;">';
            html+='<div class="quick-btns" style="margin-bottom:6px;">';
            html+='<span class="quick-btn" onclick="setQtd(\'15g\')">15g</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'50g\')">50g</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'100g\')">100g</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'200g\')">200g</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'500g\')">500g</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'1kg\')">1kg</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'50mL\')">50mL</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'100mL\')">100mL</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'250mL\')">250mL</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'1L\')">1L</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'1 un\')">1 un</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'2 un\')">2 un</span>';
            html+='</div>';
            html+='<input type="text" id="produtoQtd" placeholder="Quantidade..." style="margin-bottom:6px;">';
            html+='<button class="btn btn-outline btn-sm" onclick="adicionarProduto()">+ Adicionar Produto</button>';
            html+='<div style="margin-top:8px;">'+prodList+'</div></div>';
            
            // Botões de ação
            html+='<button class="btn btn-success" onclick="finalizarAtendimento()" style="margin-bottom:8px;">✅ Finalizar Atendimento</button>';
            html+='<button class="btn btn-danger" onclick="cancelarAtendimento()">❌ Cancelar</button>';
            
            render(html);
        }

        function setQtd(val){
            document.getElementById('produtoQtd').value=val;
        }

        function toggleProcedimento(nome){
            var idx=procedimentosFeitos.indexOf(nome);
            if(idx>-1){procedimentosFeitos.splice(idx,1);}else{procedimentosFeitos.push(nome);}
            mostrarAtendimentoAtivo();
        }

        function adicionarProduto(){
            var nome=document.getElementById('produtoNome').value.trim();
            var qtd=document.getElementById('produtoQtd').value.trim();
            if(!nome)return;
            produtosUsados.push({nome:nome,qtd:qtd||'1 un'});
            document.getElementById('produtoNome').value='';
            document.getElementById('produtoQtd').value='';
            mostrarAtendimentoAtivo();
        }

        function removerProduto(idx){
            produtosUsados.splice(idx,1);
            mostrarAtendimentoAtivo();
        }

        // ==================== FINALIZAR ====================
        async function finalizarAtendimento(){
            if(!confirm('Deseja finalizar este atendimento?'))return;
            clearInterval(timerInterval);
            document.getElementById('alertaTimer').classList.remove('show');
            
            var horaFim=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
            var duracao=Math.floor(segundos/60);
            
            var dados={
                clienteId:atendimentoAtivo.clienteId,
                clienteNome:atendimentoAtivo.clienteNome,
                piscineiroNome:userLogado?userLogado.nome:'Piscineiro',
                piscineiroId:userLogado?userLogado.uid:'',
                data:atendimentoAtivo.data,
                horaInicio:atendimentoAtivo.horaInicio,
                horaFim:horaFim,
                duracao:duracao,
                status:'concluido',
                procedimentos:procedimentosFeitos.join(', '),
                produtos:produtosUsados.map(function(p){return p.nome+' ('+p.qtd+')';}).join(', '),
                criadoEm:firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try{
                await db.collection('atendimentos').add(dados);
                
                // Dar baixa no estoque do cliente
                for(var i=0;i<produtosUsados.length;i++){
                    var prod=produtosUsados[i];
                    // Procurar produto no estoque das piscinas do cliente
                    for(var j=0;j<piscinasCliente.length;j++){
                        var pisc=piscinasCliente[j];
                        var estSnap=await db.collection('piscinas').doc(pisc.id).collection('estoque').where('nome','==',prod.nome).get();
                        estSnap.docs.forEach(async function(ed){
                            var atual=ed.data().quantidade||0;
                            // Tentar extrair número da quantidade
                            var qtdNum=parseFloat(prod.qtd)||1;
                            var novo=Math.max(0,atual-qtdNum);
                            await db.collection('piscinas').doc(pisc.id).collection('estoque').doc(ed.id).update({quantidade:novo,atualizadoEm:firebase.firestore.FieldValue.serverTimestamp()});
                        });
                    }
                }
                
                alert('✅ Atendimento registrado com sucesso!');
            }catch(e){
                alert('Erro ao salvar: '+e.message);
                var offlineData=JSON.parse(localStorage.getItem('aquapluss-offline')||'[]');
                offlineData.push(dados);
                localStorage.setItem('aquapluss-offline',JSON.stringify(offlineData));
            }
            
            atendimentoAtivo=null;
            localStorage.removeItem('aquapluss-atendimento');
            segundos=0;produtosUsados=[];procedimentosFeitos=[];
            carregarApp();
        }

        function cancelarAtendimento(){
            if(!confirm('Cancelar este atendimento?'))return;
            clearInterval(timerInterval);
            document.getElementById('alertaTimer').classList.remove('show');
            atendimentoAtivo=null;
            localStorage.removeItem('aquapluss-atendimento');
            segundos=0;produtosUsados=[];procedimentosFeitos=[];
            carregarApp();
        }

        // ==================== ESTOQUE GERAL ====================
        async function mostrarEstoqueGeral(){
            showLoading('Carregando estoque...');
            try{
                var html='<div class="card"><div class="card-title"><span class="icon">📦</span>Estoque dos Clientes</div>';
                var pSnap=await db.collection('piscinas').where('status','==','ativa').get();
                if(pSnap.empty){
                    html+='<p style="color:var(--text2);">Nenhuma piscina ativa.</p>';
                }else{
                    for(var i=0;i<pSnap.docs.length;i++){
                        var p=pSnap.docs[i].data();
                        html+='<p style="font-size:13px;font-weight:600;margin-bottom:4px;">🏊 '+p.codigo+' - '+p.clienteNome+'</p>';
                        var estSnap=await db.collection('piscinas').doc(pSnap.docs[i].id).collection('estoque').get();
                        if(estSnap.empty){
                            html+='<p style="font-size:12px;color:var(--text2);margin-bottom:8px;">Nenhum produto</p>';
                        }else{
                            estSnap.docs.forEach(function(ed){
                                var e=ed.data();
                                var q=e.quantidade||0;
                                var sc=q<=0?'esgotado':(q<=(e.quantidadeMinima||3)?'baixo':'');
                                html+='<div class="estoque-item"><span>🧴 '+e.nome+' ('+(e.marca||'')+')</span><span class="estoque-qtd '+sc+'">'+q+' '+(e.unidade||'un')+'</span></div>';
                            });
                        }
                    }
                }
                html+='</div>';
                render(html);
            }catch(e){
                render('<div class="card"><p style="color:#dc2626;">Erro: '+e.message+'</p></div>');
            }
        }

        // ==================== HISTÓRICO ====================
        async function mostrarHistorico(){
            showLoading('Carregando histórico...');
            try{
                var html='<div class="card"><div class="card-title"><span class="icon">📊</span>Meus Atendimentos</div>';
                var uid=userLogado?userLogado.uid:'';
                var snap=await db.collection('atendimentos').where('piscineiroId','==',uid).orderBy('criadoEm','desc').limit(20).get();
                if(snap.empty){
                    html+='<p style="color:var(--text2);">Nenhum atendimento registrado.</p>';
                }else{
                    snap.docs.forEach(function(d){
                        var a=d.data();
                        html+='<div style="padding:10px 0;border-bottom:1px solid #f1f5f9;">';
                        html+='<p style="font-size:13px;font-weight:600;">🏠 '+a.clienteNome+'</p>';
                        html+='<p style="font-size:11px;color:var(--text2);">📅 '+a.data+' | ⏱️ '+a.duracao+'min</p>';
                        html+='<p style="font-size:11px;color:var(--text2);">🔧 '+(a.procedimentos||'Nenhum')+'</p>';
                        html+='</div>';
                    });
                }
                html+='</div>';
                render(html);
            }catch(e){
                render('<div class="card"><p style="color:#dc2626;">Erro: '+e.message+'</p></div>');
            }
        }

        // ==================== SINCRONIZAÇÃO OFFLINE ====================
        async function sincronizarOffline(){
            var offlineData=JSON.parse(localStorage.getItem('aquapluss-offline')||'[]');
            if(offlineData.length===0)return;
            var sinc=0;
            for(var i=0;i<offlineData.length;i++){
                try{await db.collection('atendimentos').add(offlineData[i]);sinc++;}catch(e){break;}
            }
            if(sinc>0){offlineData.splice(0,sinc);localStorage.setItem('aquapluss-offline',JSON.stringify(offlineData));}
        }

        // ==================== INIT ====================
        function init(){
            var sessionUser=sessionStorage.getItem('aquapluss-piscineiro-user');
            if(sessionUser){
                try{
                    var userData=JSON.parse(sessionUser);
                    console.log('✅ Sessão:',userData.email);
                    sincronizarOffline();
                    carregarApp();
                }catch(e){sessionStorage.removeItem('aquapluss-piscineiro-user');showLogin();}
                return;
            }
            auth.onAuthStateChanged(function(user){
                if(user){
                    sessionStorage.setItem('aquapluss-piscineiro-user',JSON.stringify({uid:user.uid,email:user.email}));
                    sincronizarOffline();
                    carregarApp();
                }else{showLogin();}
            });
        }

        // PWA
        if('serviceWorker' in navigator){
            window.addEventListener('load',function(){
                caches.open('aquapluss-v2').then(function(c){c.addAll(['./','./?utm_source=pwa']);});
            });
        }

        init();
        console.log('🚀 AquaPluss Piscineiro v2.0');
    </script>
</body>
