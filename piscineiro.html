<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AquaPluss - App Piscineiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        
        :root{
            --primary:#0891b2;--primary-dark:#0e7490;--success:#059669;
            --danger:#dc2626;--warning:#d97706;--bg:#f0f4f8;--card:#ffffff;
            --text:#1a1d23;--text2:#5a5f6b;--border:#e2e5ea;
            --shadow:0 2px 8px rgba(0,0,0,0.08);--radius:12px;
        }
        
        body{
            font-family:'Inter',-apple-system,sans-serif;
            background:var(--bg);min-height:100vh;
            -webkit-tap-highlight-color:transparent;display:flex;
        }
        
        /* SIDEBAR */
        .sidebar{
            width:270px;background:linear-gradient(180deg,#0e7490,#0891b2);
            color:white;position:fixed;top:0;left:0;bottom:0;
            z-index:200;padding:20px 0;display:flex;flex-direction:column;
            transition:transform 0.3s;
        }
        .sidebar.hidden{transform:translateX(-100%);}
        
        .sidebar-logo{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,0.2);text-align:center;}
        .sidebar-logo .icon{font-size:36px;}
        .sidebar-logo .title{font-size:18px;font-weight:700;margin-top:4px;}
        .sidebar-logo .sub{font-size:11px;opacity:0.8;}
        
        .sidebar-user{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;gap:10px;}
        .sidebar-user-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
        .sidebar-user-info{flex:1;}
        .sidebar-user-name{font-size:13px;font-weight:600;}
        .sidebar-user-role{font-size:11px;opacity:0.7;}
        
        .sidebar-nav{flex:1;padding:10px 0;overflow-y:auto;}
        .sidebar-nav a{
            display:flex;align-items:center;gap:10px;
            padding:12px 20px;color:rgba(255,255,255,0.8);
            text-decoration:none;font-size:14px;font-weight:500;
            transition:all 0.2s;cursor:pointer;
        }
        .sidebar-nav a:hover,.sidebar-nav a.active{background:rgba(255,255,255,0.15);color:white;}
        .sidebar-nav a .nav-icon{font-size:18px;width:24px;text-align:center;position:relative;}
        
        .timer-badge{
            position:absolute;top:-6px;right:-8px;
            background:var(--danger);color:white;
            font-size:10px;font-weight:700;
            min-width:20px;height:20px;border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            padding:0 5px;animation:pulse 1s infinite;
            cursor:pointer;
        }
        
        @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
        
        .sidebar-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,0.2);}
        
        /* MAIN */
        .main-content{flex:1;margin-left:270px;min-height:100vh;transition:margin-left 0.3s;}
        .main-content.expanded{margin-left:0;}
        
        .mobile-header{display:none;background:var(--primary);color:white;padding:14px 16px;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
        .mobile-header .menu-btn{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:4px;}
        .mobile-header .title{font-size:16px;font-weight:600;flex:1;}
        
        .container{padding:16px;max-width:550px;margin:0 auto;}
        
        /* CARDS */
        .card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);animation:fadeIn 0.3s ease;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        
        .card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
        
        /* BOTÕES */
        .btn{
            display:inline-flex;align-items:center;justify-content:center;gap:6px;
            padding:12px 20px;border:none;border-radius:10px;
            font-size:14px;font-weight:600;cursor:pointer;
            font-family:inherit;transition:all 0.2s;
            text-align:center;width:100%;
            position:relative;overflow:hidden;
        }
        .btn:active{transform:scale(0.96);}
        .btn::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,0.3);transform:translate(-50%,-50%);transition:width 0.6s,height 0.6s;}
        .btn:active::after{width:300px;height:300px;}
        .btn-primary{background:var(--primary);color:white;}
        .btn-success{background:var(--success);color:white;}
        .btn-danger{background:var(--danger);color:white;}
        .btn-warning{background:var(--warning);color:white;}
        .btn-outline{background:white;border:2px solid var(--primary);color:var(--primary);}
        .btn-sm{padding:8px 14px;font-size:12px;width:auto;}
        .btn-xs{padding:6px 10px;font-size:11px;width:auto;border-radius:8px;}
        .btn-whats{background:#25D366;color:white;}
        .btn-whats:hover{background:#1ebe57;}
        
        /* TIMER */
        .timer-display{text-align:center;padding:20px;background:linear-gradient(135deg,#ecfeff,#e0f2fe);border-radius:var(--radius);margin-bottom:12px;}
        .timer-number{font-size:64px;font-weight:700;color:var(--primary);letter-spacing:-2px;transition:color 0.3s;}
        .timer-number.alerta{color:var(--danger);animation:pulse 0.8s infinite;}
        .timer-label{font-size:12px;color:var(--text2);margin-top:4px;}
        
        /* TAGS */
        .tag-group{display:flex;flex-wrap:wrap;gap:6px;}
        .tag{padding:8px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;border:1px solid var(--border);background:#f8fafc;transition:all 0.2s;user-select:none;}
        .tag:active{transform:scale(0.95);}
        .tag.active{background:var(--primary);color:white;border-color:var(--primary);box-shadow:0 2px 8px rgba(8,145,178,0.3);}
        
        /* LISTA DE PRODUTOS DO ESTOQUE */
        .produto-estoque-item{
            display:flex;align-items:center;justify-content:space-between;
            padding:10px 0;border-bottom:1px solid #f1f5f9;
            cursor:pointer;transition:background 0.2s;
        }
        .produto-estoque-item:hover{background:#f8fafc;}
        .produto-estoque-item:last-child{border-bottom:none;}
        .produto-estoque-info{flex:1;}
        .produto-estoque-nome{font-size:13px;font-weight:500;}
        .produto-estoque-marca{font-size:11px;color:var(--text2);}
        .produto-estoque-qtd{font-weight:600;font-size:13px;white-space:nowrap;margin-left:8px;}
        .produto-estoque-qtd.baixo{color:var(--warning);}
        .produto-estoque-qtd.esgotado{color:var(--danger);}
        .produto-estoque-qtd.ok{color:var(--primary);}
        
        .produto-usado-item{
            display:flex;align-items:center;justify-content:space-between;
            padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px;
        }
        
        .estoque-item{
            display:flex;align-items:center;justify-content:space-between;
            padding:10px 0;border-bottom:1px solid #f1f5f9;font-size:13px;
        }
        .estoque-item:last-child{border-bottom:none;}
        
        /* INPUT */
        input,select,textarea{
            width:100%;padding:12px;border:1px solid var(--border);
            border-radius:8px;font-size:14px;font-family:inherit;
            margin-bottom:8px;background:#f8fafc;transition:border 0.2s;
        }
        input:focus,select:focus,textarea:focus{
            outline:none;border-color:var(--primary);
            box-shadow:0 0 0 3px rgba(8,145,178,0.1);background:white;
        }
        label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;}
        
        .badge{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;}
        .badge-success{background:#ecfdf5;color:#065f46;}
        .badge-warning{background:#fef3c7;color:#92400e;}
        .badge-danger{background:#fef2f2;color:#991b1b;}
        
        .alert-toast{
            position:fixed;top:20px;left:50%;transform:translateX(-50%);
            background:var(--danger);color:white;padding:16px 24px;
            border-radius:var(--radius);font-weight:600;z-index:1000;
            display:none;box-shadow:0 4px 20px rgba(0,0,0,0.3);
            text-align:center;max-width:90%;
        }
        .alert-toast.show{display:block;animation:slideDown 0.3s ease;}
        @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
        
        .sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:199;}
        .sidebar-overlay.show{display:block;}
        
        .login-box{max-width:400px;margin:60px auto;padding:20px;}
        .login-logo{text-align:center;font-size:48px;margin-bottom:16px;}
        .login-title{text-align:center;font-size:20px;font-weight:600;color:var(--text);}
        .login-subtitle{text-align:center;font-size:13px;color:var(--text2);margin-bottom:24px;}
        
        .loading{text-align:center;padding:40px;color:var(--text2);}
        .spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        
        .cliente-card{
            padding:14px;border-radius:var(--radius);border:1px solid var(--border);
            margin-bottom:8px;cursor:pointer;transition:all 0.2s;background:white;
        }
        .cliente-card:hover{border-color:var(--primary);box-shadow:var(--shadow);}
        .cliente-card .cliente-nome{font-size:14px;font-weight:600;}
        .cliente-card .cliente-end{font-size:12px;color:var(--text2);margin-top:2px;}
        .cliente-card .cliente-acoes{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;}
        
        .empty-state{text-align:center;padding:40px;color:var(--text2);}
        .empty-state .icon{font-size:48px;margin-bottom:12px;}
        
        .quick-btns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
        .quick-btn{
            padding:6px 10px;border-radius:14px;border:1px solid var(--border);
            background:white;font-size:11px;font-weight:500;cursor:pointer;
            transition:all 0.2s;font-family:inherit;
        }
        .quick-btn:hover{background:var(--primary);color:white;border-color:var(--primary);}
        
        @media (max-width:768px){
            .sidebar{transform:translateX(-100%);}.sidebar.show{transform:translateX(0);}
            .main-content{margin-left:0;}.mobile-header{display:flex;}
            .sidebar-overlay.show{display:block;}.timer-number{font-size:48px;}
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><div class="icon">🔧</div><div class="title">AquaPluss</div><div class="sub">App Piscineiro</div></div>
        <div class="sidebar-user">
            <div class="sidebar-user-avatar" id="sidebarAvatar">P</div>
            <div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebarNome">Piscineiro</div><div class="sidebar-user-role" id="sidebarEmail">carregando...</div></div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer"><button class="btn btn-outline btn-sm" onclick="sairApp()" style="color:white;border-color:rgba(255,255,255,0.5);background:transparent;width:100%;">🚪 Sair</button></div>
    </aside>

    <main class="main-content" id="mainContent">
        <div class="mobile-header"><button class="menu-btn" onclick="toggleSidebar()">☰</button><span class="title">AquaPluss Piscineiro</span></div>
        <div class="alert-toast" id="alertaTimer">⏰ Atendimento passou de 15 min!<br><button class="btn btn-warning btn-sm" onclick="prorrogarTempo()" style="margin-top:8px;width:auto;">Prorrogar +10 min</button></div>
        <div class="container" id="appContent"></div>
    </main>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyByxj9418BYG26MpB1h9GZAFUmRiu_3HZc",
            authDomain: "aquaplusspiscinas.firebaseapp.com",
            projectId: "aquaplusspiscinas",
            storageBucket: "aquaplusspiscinas.firebasestorage.app",
            messagingSenderId: "844112800471",
            appId: "1:844112800471:web:468c21d1eafdd9a4071e92"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        var atendimentoAtivo = null, timerInterval = null, segundos = 0, tempoLimite = 900; // 15 minutos
        var prorrogado = false, alertaMostrado = false, timerPausado = false;
        var procedimentosPadrao = ["Drenagem","Escovação","Limpeza pré-filtro","Aspiração","Teste pH","Aplicação cloro","Clarificação","Limpeza bordas","Retrolavagem"];
        var produtosUsados = [], procedimentosFeitos = [], audioContext = null;
        var userLogado = null, piscinasCliente = [], clienteSelecionado = null;
        var paginaAtual = 'clientes';

        function render(html){document.getElementById('appContent').innerHTML = html;}
        function showLoading(msg){render('<div class="loading"><div class="spinner"></div><p style="margin-top:12px;">'+(msg||'Carregando...')+'</p></div>');}

        function toggleSidebar(){
            document.getElementById('sidebar').classList.toggle('show');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        function atualizarSidebar(){
            var nav = document.getElementById('sidebarNav');
            var html = '';
            
            // Timer badge se atendimento ativo
            var timerBadge = '';
            if(atendimentoAtivo && !timerPausado){
                var min = Math.floor(segundos/60), seg = segundos%60;
                timerBadge = '<span class="timer-badge" onclick="voltarParaAtendimento()" title="Voltar ao atendimento">'+String(min).padStart(2,'0')+':'+String(seg).padStart(2,'0')+'</span>';
            }
            
            // Se não tem atendimento ativo, mostra Clientes e Meus Atendimentos
            if(!atendimentoAtivo){
                html += '<a onclick="navegar(\'clientes\')" id="navClientes" class="active"><span class="nav-icon">📋</span> Clientes</a>';
                html += '<a onclick="navegar(\'historico\')" id="navHistorico"><span class="nav-icon">📊</span> Meus Atendimentos</a>';
            } else {
                // Se tem atendimento ativo, mostra todas as opções
                html += '<a onclick="voltarParaAtendimento()" id="navAtendimento" class="active"><span class="nav-icon">⏱️'+timerBadge+'</span> Atendimento</a>';
                html += '<a onclick="navegar(\'procedimentos\')" id="navProcedimentos"><span class="nav-icon">🔧</span> Procedimentos</a>';
                html += '<a onclick="navegar(\'produtos\')" id="navProdutos"><span class="nav-icon">🧪</span> Produtos</a>';
                html += '<a onclick="navegar(\'estoque\')" id="navEstoque"><span class="nav-icon">📦</span> Estoque</a>';
            }
            
            document.getElementById('sidebarNav').innerHTML = html;
            
            // Marcar ativo
            var activeId = 'nav' + paginaAtual.charAt(0).toUpperCase() + paginaAtual.slice(1);
            var el = document.getElementById(activeId);
            if(el) el.classList.add('active');
        }

        function voltarParaAtendimento(){
            paginaAtual = 'atendimento';
            atualizarSidebar();
            mostrarAtendimentoAtivo();
            if(window.innerWidth <= 768) toggleSidebar();
        }

        function navegar(pagina){
            if(atendimentoAtivo && pagina === 'estoque'){
                // Pausar timer quando for pro estoque
                timerPausado = true;
                paginaAtual = 'estoque';
                atualizarSidebar();
                if(window.innerWidth <= 768) toggleSidebar();
                mostrarEstoqueGeral();
                return;
            }
            
            if(atendimentoAtivo && pagina === 'procedimentos'){
                paginaAtual = 'procedimentos';
                atualizarSidebar();
                if(window.innerWidth <= 768) toggleSidebar();
                mostrarProcedimentos();
                return;
            }
            
            if(atendimentoAtivo && pagina === 'produtos'){
                paginaAtual = 'produtos';
                atualizarSidebar();
                if(window.innerWidth <= 768) toggleSidebar();
                mostrarProdutos();
                return;
            }
            
            if(!atendimentoAtivo){
                paginaAtual = pagina;
                atualizarSidebar();
                if(window.innerWidth <= 768) toggleSidebar();
                if(pagina === 'clientes') mostrarSelecaoCliente();
                else if(pagina === 'historico') mostrarHistorico();
                return;
            }
            
            voltarParaAtendimento();
        }

        // ==================== ÁUDIO ====================
        function beep(){
            try{
                if(!audioContext) audioContext = new(window.AudioContext||window.webkitAudioContext)();
                if(audioContext.state === 'suspended') audioContext.resume();
                var o=audioContext.createOscillator(),g=audioContext.createGain();
                o.connect(g);g.connect(audioContext.destination);
                o.frequency.value=1000;o.type="square";g.gain.value=0.5;
                o.start(audioContext.currentTime);
                o.stop(audioContext.currentTime+0.3);
            }catch(e){}
        }
        function beepTriplo(){beep();setTimeout(beep,500);setTimeout(beep,1000);}

        // ==================== LOGIN ====================
        function showLogin(){
            render('<div class="login-box"><div class="login-logo">🔧</div><div class="login-title">AquaPluss Piscineiro</div><div class="login-subtitle">Faça login para começar</div><div class="card"><form id="loginForm"><div style="margin-bottom:12px;"><label>E-mail</label><input type="email" id="emailInput" placeholder="seu@email.com" required></div><div style="margin-bottom:12px;"><label>Senha</label><input type="password" id="passwordInput" placeholder="••••••••" required></div><button type="submit" class="btn btn-primary" id="loginBtn">Entrar</button></form><p id="loginError" style="color:#dc2626;font-size:12px;margin-top:8px;display:none;"></p></div></div>');
            document.getElementById('loginForm').addEventListener('submit',function(e){
                e.preventDefault();
                var email=document.getElementById('emailInput').value.trim(),pw=document.getElementById('passwordInput').value;
                var btn=document.getElementById('loginBtn'),errEl=document.getElementById('loginError');
                if(!email||!pw){errEl.textContent='Preencha todos os campos.';errEl.style.display='block';return;}
                btn.disabled=true;btn.textContent='Entrando...';errEl.style.display='none';
                auth.signInWithEmailAndPassword(email,pw)
                    .then(function(uc){
                        sessionStorage.setItem('aquapluss-piscineiro-user',JSON.stringify({uid:uc.user.uid,email:uc.user.email}));
                        carregarApp();
                    })
                    .catch(function(err){
                        var msg='Erro.';if(err.code==='auth/user-not-found')msg='Usuário não encontrado.';else if(err.code==='auth/wrong-password')msg='Senha incorreta.';
                        errEl.textContent=msg;errEl.style.display='block';btn.disabled=false;btn.textContent='Entrar';
                    });
            });
        }

        function sairApp(){
            if(confirm('Deseja sair?')){
                sessionStorage.removeItem('aquapluss-piscineiro-user');
                localStorage.removeItem('aquapluss-atendimento');
                if(timerInterval)clearInterval(timerInterval);
                auth.signOut().then(showLogin).catch(function(){showLogin();});
            }
        }

        // ==================== APP ====================
        async function carregarApp(){
            var saved=localStorage.getItem('aquapluss-atendimento');
            if(saved){
                try{
                    atendimentoAtivo=JSON.parse(saved);
                    segundos=Math.floor((new Date()-new Date(atendimentoAtivo.timestamp||new Date()))/1000);
                    if(segundos<0)segundos=0;
                    if(segundos>=tempoLimite&&!atendimentoAtivo.prorrogado)alertaMostrado=true;
                    timerInterval=setInterval(atualizarTimer,1000);
                    paginaAtual='atendimento';
                    atualizarSidebar();
                    mostrarAtendimentoAtivo();
                    return;
                }catch(e){localStorage.removeItem('aquapluss-atendimento');}
            }
            
            try{
                var sessionUser=JSON.parse(sessionStorage.getItem('aquapluss-piscineiro-user'));
                if(sessionUser){
                    var userDoc=await db.collection('usuarios').doc(sessionUser.uid).get();
                    if(userDoc.exists){userLogado=userDoc.data();userLogado.uid=sessionUser.uid;}
                    document.getElementById('sidebarNome').textContent=userLogado?userLogado.nome:'Piscineiro';
                    document.getElementById('sidebarEmail').textContent=sessionUser.email;
                    document.getElementById('sidebarAvatar').textContent=(userLogado?userLogado.nome:'P').substring(0,2).toUpperCase();
                }
            }catch(e){}
            
            paginaAtual='clientes';
            atualizarSidebar();
            mostrarSelecaoCliente();
        }

        // ==================== SELEÇÃO DE CLIENTES ====================
        async function mostrarSelecaoCliente(){
            showLoading('Carregando clientes...');
            try{
                var hojeStr=new Date().toISOString().split('T')[0];
                var clientesSnap=await db.collection('clientes').where('status','==','ativo').orderBy('nome').get();
                if(clientesSnap.empty){render('<div class="empty-state"><div class="icon">📋</div><p>Nenhum cliente ativo.</p></div>');return;}
                
                var html='';
                clientesSnap.docs.forEach(function(d){
                    var c=d.data();
                    html+='<div class="cliente-card">';
                    html+='<div class="cliente-nome">🏠 '+c.nome+'</div>';
                    html+='<div class="cliente-end">📍 '+(c.logradouro||'')+', '+(c.numero||'')+' - '+(c.bairro||'')+'</div>';
                    html+='<div class="cliente-acoes">';
                    html+='<button class="btn btn-primary btn-sm" onclick="iniciarAtendimento(\''+d.id+'\',\''+c.nome.replace(/'/g,"\\'")+'\')">▶️ Iniciar</button>';
                    if(c.telefone){
                        var tel=c.telefone.replace(/\D/g,'');
                        html+='<a href="https://wa.me/55'+tel+'" target="_blank" class="btn btn-whats btn-sm" style="text-decoration:none;">💬 WhatsApp</a>';
                    }
                    html+='</div></div>';
                });
                render(html);
            }catch(e){render('<div class="card"><p style="color:#dc2626;">Erro: '+e.message+'</p></div>');}
        }

        // ==================== ATENDIMENTO ====================
        async function iniciarAtendimento(clienteId,clienteNome){
            segundos=0;prorrogado=false;alertaMostrado=false;timerPausado=false;
            produtosUsados=[];procedimentosFeitos=[];tempoLimite=900; // 15 min
            
            // Buscar piscinas do cliente
            piscinasCliente=[];
            try{
                var pSnap=await db.collection('piscinas').where('clienteId','==',clienteId).get();
                pSnap.docs.forEach(function(pd){piscinasCliente.push({id:pd.id,data:pd.data()});});
            }catch(e){}
            
            clienteSelecionado = {id:clienteId,nome:clienteNome};
            
            var horaInicio=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
            var hojeStr=new Date().toISOString().split('T')[0];
            
            atendimentoAtivo={clienteId:clienteId,clienteNome:clienteNome,horaInicio:horaInicio,data:hojeStr,status:'em_andamento',timestamp:new Date().toISOString()};
            localStorage.setItem('aquapluss-atendimento',JSON.stringify(atendimentoAtivo));
            if(timerInterval)clearInterval(timerInterval);
            timerInterval=setInterval(atualizarTimer,1000);
            
            paginaAtual='atendimento';
            atualizarSidebar();
            mostrarAtendimentoAtivo();
        }

        function atualizarTimer(){
            if(timerPausado) return; // Não conta se estiver pausado (vendo estoque)
            segundos++;
            var min=Math.floor(segundos/60),seg=segundos%60;
            var display=String(min).padStart(2,'0')+':'+String(seg).padStart(2,'0');
            var el=document.getElementById('timerDisplay');
            if(el)el.textContent=display;
            
            if(!prorrogado&&segundos>=tempoLimite&&!alertaMostrado){
                alertaMostrado=true;
                document.getElementById('alertaTimer').classList.add('show');
                var tel=document.getElementById('timerDisplay');
                if(tel)tel.classList.add('alerta');
                beepTriplo();
                if(navigator.vibrate)navigator.vibrate([300,200,300,200,300]);
            }
        }

        function prorrogarTempo(){
            prorrogado=true;alertaMostrado=false;tempoLimite+=600;
            document.getElementById('alertaTimer').classList.remove('show');
            var tel=document.getElementById('timerDisplay');
            if(tel)tel.classList.remove('alerta');
            if(atendimentoAtivo){atendimentoAtivo.prorrogado=true;localStorage.setItem('aquapluss-atendimento',JSON.stringify(atendimentoAtivo));}
        }

        function mostrarAtendimentoAtivo(){
            paginaAtual='atendimento';
            timerPausado=false;
            atualizarSidebar();
            
            var a=atendimentoAtivo;
            if(!a){carregarApp();return;}
            var min=Math.floor(segundos/60),seg=segundos%60;
            var display=String(min).padStart(2,'0')+':'+String(seg).padStart(2,'0');
            
            var html='';
            html+='<div class="timer-display">';
            html+='<div class="timer-number'+(alertaMostrado?' alerta':'')+'" id="timerDisplay">'+display+'</div>';
            html+='<div class="timer-label">minutos:segundos</div>';
            html+='<p style="font-size:14px;margin-top:4px;">🏠 <strong>'+a.clienteNome+'</strong></p>';
            html+='<p style="font-size:12px;color:var(--text2);">Início: '+a.horaInicio+'</p>';
            html+='</div>';
            
            // Resumo rápido
            html+='<div class="card"><div class="card-title">📋 Resumo</div>';
            html+='<p style="font-size:13px;">🔧 Procedimentos: <strong>'+(procedimentosFeitos.length||0)+'</strong> selecionados</p>';
            html+='<p style="font-size:13px;">🧪 Produtos: <strong>'+(produtosUsados.length||0)+'</strong> adicionados</p>';
            html+='</div>';
            
            html+='<button class="btn btn-success" onclick="finalizarAtendimento()" style="margin-bottom:8px;">✅ Finalizar Atendimento</button>';
            html+='<button class="btn btn-danger" onclick="cancelarAtendimento()">❌ Cancelar</button>';
            
            render(html);
        }

        // ==================== PROCEDIMENTOS ====================
        function mostrarProcedimentos(){
            paginaAtual='procedimentos';
            atualizarSidebar();
            
            var procTags='';
            procedimentosPadrao.forEach(function(p){
                var ativo=procedimentosFeitos.includes(p)?' active':'';
                procTags+='<span class="tag'+ativo+'" onclick="toggleProcedimento(\''+p.replace(/'/g,"\\'")+'\')">'+p+'</span>';
            });
            
            var html='<div class="card"><div class="card-title">🔧 Procedimentos Realizados</div>';
            html+='<div class="tag-group">'+procTags+'</div></div>';
            html+='<button class="btn btn-primary" onclick="voltarParaAtendimento()">✅ Concluir Procedimentos</button>';
            render(html);
        }

        function toggleProcedimento(nome){
            var idx=procedimentosFeitos.indexOf(nome);
            if(idx>-1){procedimentosFeitos.splice(idx,1);}else{procedimentosFeitos.push(nome);}
            mostrarProcedimentos();
        }

        // ==================== PRODUTOS ====================
        function mostrarProdutos(){
            paginaAtual='produtos';
            atualizarSidebar();
            
            var prodList='';
            if(produtosUsados.length===0){
                prodList='<p style="color:var(--text2);font-size:12px;text-align:center;">Nenhum produto adicionado</p>';
            }else{
                produtosUsados.forEach(function(p,idx){
                    prodList+='<div class="produto-usado-item"><span>🧴 '+p.nome+' - '+p.qtd+'</span><span style="color:var(--danger);cursor:pointer;font-size:18px;" onclick="removerProduto('+idx+')">✕</span></div>';
                });
            }
            
            // Botões rápidos
            var html='<div class="card"><div class="card-title">🧪 Produtos Utilizados</div>';
            html+='<input type="text" id="produtoNome" placeholder="Nome do produto..." style="margin-bottom:4px;">';
            html+='<div class="quick-btns">';
            html+='<span class="quick-btn" onclick="setQtd(\'15g\')">15g</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'50g\')">50g</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'100g\')">100g</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'200g\')">200g</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'500g\')">500g</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'1kg\')">1kg</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'50mL\')">50mL</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'100mL\')">100mL</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'250mL\')">250mL</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'1L\')">1L</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'1 un\')">1 un</span>';
            html+='<span class="quick-btn" onclick="setQtd(\'2 un\')">2 un</span>';
            html+='</div>';
            html+='<input type="text" id="produtoQtd" placeholder="Quantidade..." style="margin-bottom:6px;">';
            html+='<button class="btn btn-outline btn-sm" onclick="adicionarProduto()">+ Adicionar Produto</button>';
            html+='<div style="margin-top:8px;">'+prodList+'</div></div>';
            
            html+='<button class="btn btn-primary" onclick="voltarParaAtendimento()">✅ Concluir Produtos</button>';
            render(html);
        }

        function setQtd(val){document.getElementById('produtoQtd').value=val;}
        function adicionarProduto(){
            var nome=document.getElementById('produtoNome').value.trim();
            var qtd=document.getElementById('produtoQtd').value.trim();
            if(!nome)return;
            produtosUsados.push({nome:nome,qtd:qtd||'1 un'});
            mostrarProdutos();
        }
        function removerProduto(idx){produtosUsados.splice(idx,1);mostrarProdutos();}

        // ==================== ESTOQUE ====================
        async function mostrarEstoqueGeral(){
            showLoading('Carregando estoque...');
            try{
                var html='';
                if(atendimentoAtivo){
                    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">';
                    html+='<span class="timer-badge" style="position:static;cursor:pointer;" onclick="voltarParaAtendimento()">⏱️ Voltar</span>';
                    html+='<span style="font-size:12px;color:var(--text2);">Atendimento: '+atendimentoAtivo.clienteNome+'</span>';
                    html+='</div>';
                }
                
                var pSnap=await db.collection('piscinas').where('status','==','ativa').get();
                if(pSnap.empty){html+='<div class="card"><p style="color:var(--text2);">Nenhuma piscina ativa.</p></div>';}
                
                for(var i=0;i<pSnap.docs.length;i++){
                    var p=pSnap.docs[i].data();
                    html+='<div class="card">';
                    html+='<div class="card-title">🏊 '+p.codigo+' - '+p.clienteNome+'</div>';
                    var estSnap=await db.collection('piscinas').doc(pSnap.docs[i].id).collection('estoque').get();
                    if(estSnap.empty){
                        html+='<p style="font-size:12px;color:var(--text2);">Nenhum produto</p>';
                    }else{
                        estSnap.docs.forEach(function(ed){
                            var e=ed.data(),q=e.quantidade||0;
                            var sc=q<=0?'esgotado':(q<=(e.quantidadeMinima||3)?'baixo':'ok');
                            var usarDisabled=(q<=0)?'disabled':'';
                            html+='<div class="produto-estoque-item">';
                            html+='<div class="produto-estoque-info"><div class="produto-estoque-nome">🧴 '+e.nome+'</div><div class="produto-estoque-marca">'+(e.marca||'')+'</div></div>';
                            html+='<span class="produto-estoque-qtd '+sc+'">'+q+' '+(e.unidade||'un')+'</span>';
                            if(atendimentoAtivo){
                                html+='<button class="btn btn-xs '+ (q>0?'btn-primary':'') +'" style="margin-left:8px;" '+usarDisabled+' onclick="usarProdutoEstoque(\''+ed.id+'\',\''+pSnap.docs[i].id+'\')">Usar</button>';
                            }
                            html+='</div>';
                        });
                    }
                    
                    // Botão entrada
                    if(atendimentoAtivo){
                        html+='<button class="btn btn-outline btn-sm" onclick="entradaEstoque(\''+pSnap.docs[i].id+'\',\''+p.codigo+'\')" style="margin-top:8px;">📥 Dar Entrada</button>';
                    }
                    html+='</div>';
                }
                render(html);
            }catch(e){render('<div class="card"><p style="color:#dc2626;">Erro: '+e.message+'</p></div>');}
        }

        async function usarProdutoEstoque(produtoId,piscinaId){
            try{
                var ref=db.collection('piscinas').doc(piscinaId).collection('estoque').doc(produtoId);
                var doc=await ref.get();
                if(!doc.exists){alert('Produto não encontrado!');return;}
                var e=doc.data(),qtd=e.quantidade||0;
                
                var usarQtd=prompt('Quantidade a usar de '+e.nome+'?\nDisponível: '+qtd+' '+(e.unidade||'un'),'1');
                if(!usarQtd)return;
                var usarNum=parseFloat(usarQtd)||1;
                if(usarNum>qtd){alert('Quantidade insuficiente!');return;}
                
                var novo=Math.max(0,qtd-usarNum);
                await ref.update({quantidade:novo,atualizadoEm:firebase.firestore.FieldValue.serverTimestamp()});
                
                produtosUsados.push({nome:e.nome,qtd:usarNum+' '+(e.unidade||'un')});
                alert('✅ '+e.nome+' adicionado aos produtos usados!');
                mostrarEstoqueGeral();
            }catch(err){alert('Erro: '+err.message);}
        }

        function entradaEstoque(piscinaId,codigo){
            var nome=prompt('Nome do produto que está dando entrada na '+codigo+':');
            if(!nome)return;
            var qtd=prompt('Quantidade:','1');
            if(!qtd)return;
            var unidade=prompt('Unidade (ex: un, kg, L, g):','un');
            
            db.collection('piscinas').doc(piscinaId).collection('estoque').add({
                nome:nome,quantidade:parseFloat(qtd)||1,unidade:unidade||'un',
                criadoEm:firebase.firestore.FieldValue.serverTimestamp()
            }).then(function(){
                alert('✅ Entrada registrada!');
                mostrarEstoqueGeral();
            }).catch(function(e){alert('Erro: '+e.message);});
        }

        // ==================== HISTÓRICO ====================
        async function mostrarHistorico(){
            showLoading('Carregando...');
            try{
                var uid=userLogado?userLogado.uid:'';
                var snap=await db.collection('atendimentos').where('piscineiroId','==',uid).orderBy('criadoEm','desc').limit(30).get();
                var html='';
                if(snap.empty){html+='<div class="card"><p style="color:var(--text2);">Nenhum atendimento.</p></div>';}
                else{
                    snap.docs.forEach(function(d){
                        var a=d.data();
                        html+='<div class="cliente-card" onclick="alert(\'Atendimento em '+a.data+'\nCliente: '+a.clienteNome+'\nDuração: '+a.duracao+'min\nProcedimentos: '+(a.procedimentos||'Nenhum')+'\nProdutos: '+(a.produtos||'Nenhum')+'\')">';
                        html+='<div class="cliente-nome">🏠 '+a.clienteNome+'</div>';
                        html+='<div class="cliente-end">📅 '+a.data+' | ⏱️ '+a.duracao+'min | <span class="badge badge-success">'+a.status+'</span></div>';
                        html+='</div>';
                    });
                }
                render(html);
            }catch(e){render('<div class="card"><p style="color:#dc2626;">Erro: '+e.message+'</p></div>');}
            }

            // ==================== FINALIZAR ====================
            async function finalizarAtendimento(){
                if(!confirm('Deseja finalizar este atendimento?'))return;
                clearInterval(timerInterval);
                document.getElementById('alertaTimer').classList.remove('show');
                
                var horaFim=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
                var duracao=Math.floor(segundos/60);
                
                var dados={
                    clienteId:atendimentoAtivo.clienteId,clienteNome:atendimentoAtivo.clienteNome,
                    piscineiroNome:userLogado?userLogado.nome:'Piscineiro',
                    piscineiroId:userLogado?userLogado.uid:'',
                    data:atendimentoAtivo.data,horaInicio:atendimentoAtivo.horaInicio,
                    horaFim:horaFim,duracao:duracao,status:'concluido',
                    procedimentos:procedimentosFeitos.join(', '),
                    produtos:produtosUsados.map(function(p){return p.nome+' ('+p.qtd+')';}).join(', '),
                    criadoEm:firebase.firestore.FieldValue.serverTimestamp()
                };
                
                try{
                    await db.collection('atendimentos').add(dados);
                    // Dar baixa nos produtos do estoque que foram usados via botão "Usar"
                    // A baixa já foi feita no momento do "Usar"
                    alert('✅ Atendimento registrado!');
                }catch(e){
                    alert('Erro: '+e.message);
                    var off=JSON.parse(localStorage.getItem('aquapluss-offline')||'[]');off.push(dados);
                    localStorage.setItem('aquapluss-offline',JSON.stringify(off));
                }
                
                atendimentoAtivo=null;localStorage.removeItem('aquapluss-atendimento');
                segundos=0;produtosUsados=[];procedimentosFeitos=[];
                timerPausado=false;
                carregarApp();
            }

            function cancelarAtendimento(){
                if(!confirm('Cancelar?'))return;
                clearInterval(timerInterval);
                document.getElementById('alertaTimer').classList.remove('show');
                atendimentoAtivo=null;localStorage.removeItem('aquapluss-atendimento');
                segundos=0;produtosUsados=[];procedimentosFeitos=[];timerPausado=false;
                carregarApp();
            }

            // ==================== SYNC ====================
            async function sincronizarOffline(){
                var off=JSON.parse(localStorage.getItem('aquapluss-offline')||'[]');
                if(!off.length)return;
                var s=0;
                for(var i=0;i<off.length;i++){try{await db.collection('atendimentos').add(off[i]);s++;}catch(e){break;}}
                if(s>0){off.splice(0,s);localStorage.setItem('aquapluss-offline',JSON.stringify(off));}
            }

            // ==================== INIT ====================
            function init(){
                var su=sessionStorage.getItem('aquapluss-piscineiro-user');
                if(su){
                    try{JSON.parse(su);sincronizarOffline();carregarApp();}catch(e){sessionStorage.removeItem('aquapluss-piscineiro-user');showLogin();}
                    return;
                }
                auth.onAuthStateChanged(function(user){
                    if(user){sessionStorage.setItem('aquapluss-piscineiro-user',JSON.stringify({uid:user.uid,email:user.email}));sincronizarOffline();carregarApp();}
                    else{showLogin();}
                });
            }

            init();
            console.log('🚀 AquaPluss Piscineiro v3.0');
        </script>
    </body>
